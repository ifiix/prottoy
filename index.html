<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>prottoy</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #fff;
    }

    .app-shell {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100dvh;
      overflow: hidden;
    }

    .fullscreen-iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      background: #fff;
    }

    .whatsapp-button {
      position: fixed;
      left: 16px;
      bottom: calc(16px + env(safe-area-inset-bottom));
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      background: linear-gradient(135deg, #25D366, #128C7E);
      box-shadow: 0 4px 18px rgba(37, 211, 102, 0.35);
      z-index: 9999;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .whatsapp-button:hover {
      transform: scale(1.06);
    }

    .whatsapp-button:active {
      transform: scale(0.96);
    }

    .whatsapp-icon {
      width: 30px;
      height: 30px;
      fill: #fff;
    }

    .loading-container {
      position: fixed;
      inset: 0;
      z-index: 10000;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      transition: opacity 0.4s ease;
    }

    .loading-container.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .loading-content {
      text-align: center;
      color: #fff;
      padding: 20px;
    }

    .loading-spinner {
      position: relative;
      width: 72px;
      height: 72px;
      margin: 0 auto 18px;
    }

    .spinner-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 3px solid transparent;
      border-top-color: rgba(255, 255, 255, 0.9);
      animation: spin 1.2s linear infinite;
    }

    .spinner-ring:nth-child(2) {
      inset: 10px;
      border-top-color: rgba(255, 255, 255, 0.65);
      animation-delay: -0.2s;
    }

    .spinner-ring:nth-child(3) {
      inset: 20px;
      border-top-color: rgba(255, 255, 255, 0.4);
      animation-delay: -0.4s;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loading-text {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .loading-subtext {
      font-size: 13px;
      opacity: 0.9;
    }

    /* Tablets */
    @media (max-width: 992px) {
      .whatsapp-button {
        width: 52px;
        height: 52px;
        left: 14px;
      }

      .whatsapp-icon {
        width: 28px;
        height: 28px;
      }
    }

    /* Phones */
    @media (max-width: 768px) {
      .whatsapp-button {
        width: 50px;
        height: 50px;
        left: 12px;
        bottom: calc(12px + env(safe-area-inset-bottom));
      }

      .whatsapp-icon {
        width: 26px;
        height: 26px;
      }

      .loading-spinner {
        width: 60px;
        height: 60px;
      }

      .loading-text {
        font-size: 18px;
      }

      .loading-subtext {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <iframe
      class="fullscreen-iframe"
      src="https://script.google.com/macros/s/AKfycby5aOa80Vvh_eCg_9fB2maZIu73GtiRonSVemrhrgx43Y46ch5UT0gtEa_mU001-QFW0w/exec"
      allow="fullscreen"
      loading="eager"
      referrerpolicy="no-referrer-when-downgrade"
    ></iframe>
  </div>

  <a
    class="whatsapp-button"
    href="https://wa.me/01915868368"
    target="_blank"
    rel="noopener noreferrer"
    aria-label="Chat on WhatsApp"
    title="Need Help? Chat on WhatsApp"
  >
    <svg class="whatsapp-icon" viewBox="0 0 24 24">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893A11.821 11.821 0 0020.885 3.488"/>
    </svg>
  </a>

  <div class="loading-container" id="loading">
    <div class="loading-content">
      <div class="loading-spinner">
        <div class="spinner-ring"></div>
        <div class="spinner-ring"></div>
        <div class="spinner-ring"></div>
      </div>
      <div class="loading-text">Loading...</div>
      <div class="loading-subtext">Please wait</div>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const loading = document.getElementById("loading");
      const iframe = document.querySelector(".fullscreen-iframe");

      function hideLoading() {
        if (!loading.classList.contains("fade-out")) {
          loading.classList.add("fade-out");
          setTimeout(() => {
            loading.style.display = "none";
          }, 400);
        }
      }

      iframe.addEventListener("load", hideLoading);
      setTimeout(hideLoading, 8000);
    });
  </script>
</body>
</html>
